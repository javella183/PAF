<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Dissenyador PAF · Formació en IA per a centres educatius</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root{--accent:#9bb8d8;--accent-green:#c8e0b0;--text:#1b2a3a;--text-muted:#607080;--border:#d4e3ed;--shadow:0 10px 30px rgba(27,42,58,0.07);--info-bg:#eef3f9}
*{box-sizing:border-box}html{scroll-behavior:smooth}
body{margin:0;background:linear-gradient(135deg,#eef5e8 0%,#e8eef5 50%,#e4e0f0 100%);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh}
header{position:sticky;top:0;z-index:20;display:flex;align-items:center;justify-content:space-between;min-height:58px;padding:0 1.5rem;background:rgba(27,42,58,0.97);backdrop-filter:blur(10px);box-shadow:0 6px 24px rgba(0,0,0,0.15)}
.brand{display:flex;align-items:center;gap:0.8rem}
.brand-logo{height:28px;filter:brightness(0) invert(1)}
.lang-sw{display:flex;gap:0.4rem}
.lang-b{border:1px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.7);padding:0.35rem 0.85rem;border-radius:999px;font-family:'Syne',sans-serif;font-size:0.78rem;font-weight:700;cursor:pointer;transition:0.18s}
.lang-b.active,.lang-b:hover{background:var(--accent);border-color:var(--accent);color:#12202a}
main{max-width:880px;margin:0 auto;padding:1.5rem 1.5rem 3rem}
.hero{text-align:center;background:radial-gradient(circle at top right,rgba(180,196,222,0.3),transparent 40%),linear-gradient(135deg,#1b2a3a 0%,#2a3650 100%);color:#fff;border-radius:24px;padding:2rem;margin-bottom:1.5rem;box-shadow:0 18px 40px rgba(27,42,58,0.15)}
.hero h1{margin:0;font-family:'Syne',sans-serif;font-size:clamp(1.3rem,3vw,1.9rem)}
.hero p{margin:0.4rem 0 0;color:rgba(255,255,255,0.6);font-size:0.85rem}
.steps-bar{display:flex;gap:0.3rem;margin-bottom:1.5rem}
.step-dot{flex:1;height:6px;border-radius:99px;background:#d4e3ed;transition:0.4s}
.step-dot.done{background:var(--accent-green)}.step-dot.active{background:var(--accent)}
.card{background:rgba(255,255,255,0.94);border:1px solid var(--border);border-radius:20px;padding:1.6rem;box-shadow:var(--shadow);margin-bottom:1rem}
.card h2{margin:0 0 0.2rem;font-family:'Syne',sans-serif;font-size:1.2rem}
.card .sub{color:var(--text-muted);font-size:0.86rem;margin-bottom:1.1rem;line-height:1.5}
.q-explain{background:var(--info-bg);border-radius:12px;padding:0.8rem 1rem;margin-bottom:1.1rem;font-size:0.84rem;line-height:1.55;color:var(--text-muted);border-left:3px solid var(--accent)}
.fg{margin-bottom:1rem}
.fg label{display:block;font-family:'Syne',sans-serif;font-weight:700;font-size:0.84rem;margin-bottom:0.35rem}
.fg input,.fg select,.fg textarea{width:100%;padding:0.6rem 0.85rem;border:1.5px solid var(--border);border-radius:12px;font-family:'DM Sans',sans-serif;font-size:0.88rem;color:var(--text);background:#fff;transition:0.18s}
.fg input:focus,.fg select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(155,184,216,0.15)}
.chip-grid{display:flex;flex-wrap:wrap;gap:0.45rem}
.chip{display:inline-flex;align-items:center;gap:0.35rem;padding:0.45rem 0.8rem;border:1.5px solid var(--border);border-radius:12px;font-size:0.82rem;cursor:pointer;transition:0.18s;background:#fff;user-select:none;line-height:1.25}
.chip:hover{border-color:var(--accent);background:rgba(155,184,216,0.06)}
.chip.selected{border-color:var(--accent);background:rgba(155,184,216,0.14);font-weight:600}
.chip .ck{width:17px;height:17px;border-radius:5px;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:0.65rem;transition:0.18s;flex:0 0 17px}
.chip.selected .ck{background:var(--accent);border-color:var(--accent);color:#fff}

/* Usage cards grid (step 3) */
.usage-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(145px,1fr));gap:0.6rem}
.usage-card{display:flex;flex-direction:column;align-items:center;text-align:center;padding:0.9rem 0.6rem;border:1.5px solid var(--border);border-radius:14px;background:#fff;cursor:pointer;transition:all 0.2s;user-select:none;position:relative}
.usage-card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 6px 18px rgba(27,42,58,0.08)}
.usage-card.selected{border-color:#3a8a5a;background:linear-gradient(135deg,#eaf6f0,#e0f0e6);transform:translateY(-2px);box-shadow:0 6px 18px rgba(58,138,90,0.12)}
.usage-card .uc-icon{font-size:1.8rem;margin-bottom:0.4rem;transition:transform 0.2s}
.usage-card.selected .uc-icon{transform:scale(1.15)}
.usage-card .uc-text{font-size:0.76rem;line-height:1.3;color:var(--text-muted);font-weight:500}
.usage-card.selected .uc-text{color:var(--text);font-weight:600}
.usage-card .uc-check{position:absolute;top:6px;right:6px;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.6rem;background:var(--border);color:#fff;transition:0.2s}
.usage-card.selected .uc-check{background:#3a8a5a}
@media(max-width:480px){.usage-grid{grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:0.45rem}.usage-card{padding:0.7rem 0.4rem}}

/* Distribution row */
.dist-group{margin-bottom:1.2rem}
.dist-label{font-family:'Syne',sans-serif;font-weight:700;font-size:0.84rem;margin-bottom:0.5rem}
.dist-sub{font-size:0.8rem;color:var(--text-muted);margin-bottom:0.6rem}
.dist-row{display:flex;align-items:center;gap:0.7rem;padding:0.55rem 0;border-bottom:1px solid #eef3f9}
.dist-row:last-child{border-bottom:none}
.dist-icon{font-size:1.1rem;flex:0 0 24px;text-align:center}
.dist-name{flex:1;font-size:0.86rem;line-height:1.3}
.dist-input{width:70px;padding:0.4rem 0.5rem;border:1.5px solid var(--border);border-radius:8px;font-size:0.88rem;text-align:center;font-family:'DM Sans',sans-serif}
.dist-input:focus{outline:none;border-color:var(--accent)}
.dist-total{display:flex;justify-content:flex-end;gap:0.5rem;padding-top:0.5rem;font-family:'Syne',sans-serif;font-size:0.82rem;font-weight:700}
.dist-total .ok{color:var(--accent-green)}.dist-total .warn{color:#c0392b}

/* Lines */
.line-card{border:1.5px solid var(--border);border-radius:14px;padding:0.75rem 1rem;margin-bottom:0.45rem;cursor:pointer;transition:0.2s;display:flex;align-items:flex-start;gap:0.65rem;background:#fff}
.line-card:hover{opacity:0.88}
.line-card .ln{flex:0 0 26px;width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:0.7rem;font-weight:800;color:var(--text);transition:0.18s}
/* Category colors */
.line-card.cat-bases{border-left:4px solid #5a7aaa;background:#f0f4fa}.line-card.cat-bases .ln{background:#dce6f2}
.line-card.cat-bases.selected{background:#c8d8ed;border-color:#3a5a8a}.line-card.cat-bases.selected .ln{background:#3a5a8a;color:#fff}
.line-card.cat-peda{border-left:4px solid #6a8a5a;background:#f2f7ee}.line-card.cat-peda .ln{background:#ddebd4}
.line-card.cat-peda.selected{background:#c8ddb8;border-color:#4a6a3a}.line-card.cat-peda.selected .ln{background:#4a6a3a;color:#fff}
.line-card.cat-crea{border-left:4px solid #b08a40;background:#faf6ee}.line-card.cat-crea .ln{background:#f0e6cc}
.line-card.cat-crea.selected{background:#e6d8b0;border-color:#8a6a20}.line-card.cat-crea.selected .ln{background:#8a6a20;color:#fff}
.line-card.cat-tech{border-left:4px solid #7a5a8a;background:#f5f0f8}.line-card.cat-tech .ln{background:#e6dced}
.line-card.cat-tech.selected{background:#d4c4e0;border-color:#5a3a6a}.line-card.cat-tech.selected .ln{background:#5a3a6a;color:#fff}
.line-card.cat-spec{border-left:4px solid #8a5a5a;background:#f8f0f0}.line-card.cat-spec .ln{background:#eddcdc}
.line-card.cat-spec.selected{background:#e0c4c4;border-color:#6a3a3a}.line-card.cat-spec.selected .ln{background:#6a3a3a;color:#fff}
.line-card .lt{font-size:0.85rem;line-height:1.3;flex:1}
.line-card .expand-btn{flex:0 0 24px;width:24px;height:24px;border-radius:6px;border:1px solid var(--border);background:#fff;display:flex;align-items:center;justify-content:center;font-size:0.8rem;cursor:pointer;transition:0.18s;color:var(--text-muted);margin-left:auto}
.line-card .expand-btn:hover{background:var(--info-bg);border-color:var(--accent)}
.line-card .expand-btn.open{transform:rotate(45deg);background:var(--accent);color:#fff;border-color:var(--accent)}
.line-desc{display:none;font-size:0.78rem;color:var(--text-muted);line-height:1.4;margin-top:0.4rem;padding-top:0.4rem;border-top:1px solid #eef3f9}
.line-desc.show{display:block}
.line-card.locked{cursor:default;opacity:0.95}
.line-card.locked:hover{opacity:0.95}
.line-card .ln{font-size:0.85rem}
.cat-label{font-family:'Syne',sans-serif;font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:var(--text-muted);margin:0.9rem 0 0.4rem;padding-left:0.2rem}

.nav-btns{display:flex;gap:0.8rem;justify-content:flex-end;margin-top:1.3rem}
.btn{padding:0.6rem 1.4rem;border:none;border-radius:12px;font-family:'Syne',sans-serif;font-weight:700;font-size:0.86rem;cursor:pointer;transition:0.18s}
.btn-primary{background:var(--text);color:#fff}.btn-primary:hover{background:#2a4054}
.btn-secondary{background:transparent;color:var(--text);border:1.5px solid var(--border)}.btn-secondary:hover{border-color:var(--accent)}
.btn-accent{background:linear-gradient(135deg,#3a8a5a,#4a9a6a);color:#fff}.btn-accent:hover{opacity:0.9}

.mod-block{border:1.5px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:0.7rem;background:#fff}
.mod-head{display:flex;align-items:center;gap:0.7rem;padding:0.8rem 1rem;background:linear-gradient(135deg,#1b2a3a,#2a3650);color:#fff}
.mod-num{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,0.18);font-family:'Syne',sans-serif;font-size:0.75rem;font-weight:800;flex:0 0 28px}
.mod-title{font-family:'Syne',sans-serif;font-weight:700;font-size:0.88rem}
.mod-body{padding:0.8rem 1rem}
.mod-body ul{margin:0;padding-left:1.1rem}.mod-body li{font-size:0.82rem;line-height:1.5;margin-bottom:0.2rem}
.mod-tag{display:inline-block;padding:0.1rem 0.45rem;border-radius:999px;font-size:0.66rem;font-family:'Syne',sans-serif;font-weight:700;background:rgba(155,184,216,0.15);color:#4a6a9a;margin-top:0.3rem}
.summary-box{background:var(--info-bg);border-radius:14px;padding:1rem;margin-bottom:1rem}
.summary-row{display:flex;gap:0.5rem;margin-bottom:0.35rem;font-size:0.84rem}
.summary-label{font-family:'Syne',sans-serif;font-weight:700;min-width:130px}
.summary-value{color:var(--text-muted)}

.hidden{display:none}
.val-warn{display:none;margin-top:0.8rem;padding:0.7rem 1rem;border-radius:12px;background:#fdf0ef;border:1.5px solid #e8a0a0;color:#8a2a2a;font-size:0.84rem;line-height:1.45;font-weight:500;animation:shake 0.4s ease}
.val-warn.show{display:block}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-5px)}40%,80%{transform:translateX(5px)}}
.fg.invalid input,.fg.invalid select,.fg.invalid textarea{border-color:#e8a0a0;background:#fdf8f8}
@media(max-width:640px){
  header{padding:0.5rem 0.8rem}.brand-logo{height:22px}
  main{padding:1rem 0.8rem 2.5rem}.hero{padding:1.2rem 1rem;border-radius:16px}
  .card{padding:1.1rem;border-radius:16px}
  .dist-row{flex-wrap:wrap;gap:0.4rem}.dist-input{width:60px}
  .nav-btns{flex-direction:column}.btn{width:100%;text-align:center}
}
</style>
</head>

let lang='va',step=0;
const S={name:'',code:'',type:'',typeOther:'',stages:[],num:0,contactName:'',contactEmail:'',modality:'',hours:30,participation:'PUC',obs:'',levels:{zero:0,basic:0,inter:0,adv:0},prior:{none:0,self:0,cefire:0,external:0},copilot:{no:0,some:0,yes:0},usage:[],lines:[],areas:[],areaOther:''};

function t(el){if(!el)return;const v=el.getAttribute('data-'+lang);if(v){if(v.includes('<'))el.innerHTML=v;else el.textContent=v;}}
function tAll(){document.querySelectorAll('[data-va]').forEach(t);document.querySelectorAll('.lang-b').forEach(b=>b.classList.toggle('active',b.textContent.includes(lang==='va'?'Val':'Cast')));}

function renderChips(cid,items,sk){
  const c=document.getElementById(cid);
  c.innerHTML=items.map(it=>{
    const sel=S[sk].includes(it.id);
    return `<div class="chip${sel?' selected':''}" onclick="togChip('${sk}','${it.id}')">
      <span class="ck">${sel?'✓':''}</span><span>${it.icon?it.icon+' ':''}${it[lang]}</span></div>`;
  }).join('');
}
function togChip(sk,id){
  const i=S[sk].indexOf(id);i===-1?S[sk].push(id):S[sk].splice(i,1);
  if(sk==='usage')renderUsage();
  else if(sk==='areas'){
    renderChips('areasGrid',AREAS,'areas');
    const ow=document.getElementById('areaOtherWrap');
    if(ow) ow.style.display=S.areas.includes('other')?'block':'none';
    tAll();
  }
  else renderStep();
}

function renderDist(cid,items,sk,totalId,targetId,checkId){
  const c=document.getElementById(cid);
  c.innerHTML=items.map(it=>`<div class="dist-row">
    <span class="dist-icon">${it.icon}</span>
    <span class="dist-name">${it[lang]}</span>
    <input class="dist-input" type="number" min="0" max="500" value="${S[sk][it.id]||0}" onchange="updDist('${sk}','${it.id}',this.value,'${totalId}','${targetId}','${checkId}')">
  </div>`).join('');
  updDistTotals(sk,totalId,targetId,checkId);
}
function updDist(sk,id,v,tid,tgid,ckid){S[sk][id]=parseInt(v)||0;updDistTotals(sk,tid,tgid,ckid);}
function updDistTotals(sk,tid,tgid,ckid){
  const total=Object.values(S[sk]).reduce((a,b)=>a+b,0);
  document.getElementById(tid).textContent=total;
  document.getElementById(tgid).textContent=S.num;
  const el=document.getElementById(ckid);
  if(total===S.num&&S.num>0){el.textContent='✅';el.className='ok';}
  else if(total>S.num){el.textContent='⚠️';el.className='warn';}
  else{el.textContent='';el.className='';}
}

function renderUsage(){
  const c=document.getElementById('usageGrid');
  c.className='usage-grid';
  c.innerHTML=USAGE.map(it=>{
    const sel=S.usage.includes(it.id);
    return '<div class="usage-card'+(sel?' selected':'')+'" onclick="togChip(\'usage\',\''+it.id+'\')">'+
      '<span class="uc-check">'+(sel?'✓':'')+'</span>'+
      '<span class="uc-icon">'+it.icon+'</span>'+
      '<span class="uc-text">'+it[lang]+'</span>'+
    '</div>';
  }).join('');
}

function typeLabel(){return S.type==='OTHER'?(S.typeOther||'—'):(S.type||'—');}

const AUTO=[1,20];
function autoLines(){return AUTO.slice();}
function maxSelectable(){return 5;}

function renderLines(){
  const c=document.getElementById('linesContainer');
  let h='';
  ['bases','peda','crea','tech','spec'].forEach(cat=>{
    h+=`<div class="cat-label">${CATS[cat][lang]}</div>`;
    LINES.filter(l=>l.cat===cat).forEach(l=>{
      const isAuto=AUTO.includes(l.n);
      const sel=isAuto||S.lines.includes(l.n);
      const desc=LINE_DESC[l.n]?LINE_DESC[l.n][lang]:'';
      const badge=isAuto?`<span style="display:inline-block;margin-left:0.4rem;padding:0.05rem 0.4rem;border-radius:999px;background:#1b2a3a;color:#fff;font-family:'Syne',sans-serif;font-size:0.6rem;font-weight:700;vertical-align:middle;">${lang==='va'?'INCLOSA':'INCLUIDA'}</span>`:'';
      h+=`<div class="line-card cat-${l.cat}${sel?' selected':''}${isAuto?' locked':''}"${isAuto?'':` onclick="togLine(${l.n})"`}>
        <div class="ln">${sel?'✓':''}</div>
        <div style="flex:1;min-width:0;">
          <div class="lt">${l[lang]}${badge}</div>
          <div class="line-desc" id="ldesc${l.n}" onclick="event.stopPropagation()">${desc}</div>
        </div>
        ${desc?`<div class="expand-btn" id="ebtn${l.n}" onclick="event.stopPropagation();togDesc(${l.n})" title="${lang==='va'?'Més info':'Más info'}">+</div>`:''}
      </div>`;
    });
  });
  c.innerHTML=h;
  const hint=document.getElementById('linesHint');
  if(hint){
    const chosen=S.lines.filter(n=>!AUTO.includes(n)).length;
    hint.innerHTML=(lang==='va'
      ? `Les línies <b>Alfabetització bàsica en IA</b> i <b>Ètica i protecció de dades</b> s'inclouen <b>sempre</b>: són transversals i han de formar part de qualsevol formació en IA. A banda d'estes, pots triar un <b>màxim de 5 línies</b> · triades: <b>${chosen}</b>/5.`
      : `Las líneas <b>Alfabetización básica en IA</b> y <b>Ética y protección de datos</b> se incluyen <b>siempre</b>: son transversales y deben formar parte de cualquier formación en IA. Además de estas, puedes elegir un <b>máximo de 5 líneas</b> · elegidas: <b>${chosen}</b>/5.`);
  }
}

function togDesc(n){
  const d=document.getElementById('ldesc'+n);
  const b=document.getElementById('ebtn'+n);
  if(d){const open=d.classList.toggle('show');if(b)b.classList.toggle('open',open);}
}

function buildModules(){
  const chosen=S.lines.filter(n=>!AUTO.includes(n)).slice(0,5);
  return [...AUTO,...chosen];
}

function renderResult(){
  const sb=document.getElementById('summaryBox');
  const mc=document.getElementById('modulesContainer');
  const va=lang==='va';

  const stN=S.stages.map(s=>STAGES.find(st=>st.id===s)?.[lang]).filter(Boolean);
  const arN=S.areas.map(a=>{const ar=AREAS.find(x=>x.id===a);return ar?ar[lang]:a;}).filter(Boolean);
  if(S.areas.includes('other')&&S.areaOther){const i=arN.findIndex(x=>x&&x.indexOf('(')>-1);if(i>-1)arN[i]=S.areaOther;}
  const majorLevel=Object.entries(S.levels).sort((a,b)=>b[1]-a[1])[0]?.[0]||'zero';
  const lvName=LEVELS.find(l=>l.id===majorLevel)?.[lang]||'—';

  const ord=buildModules();
  const chosen=ord.filter(n=>!AUTO.includes(n)).length;

  const r=(k,v)=>`<div class="summary-row"><span class="summary-label">${k}</span><span class="summary-value">${v}</span></div>`;
  sb.innerHTML=
    r(va?'Centre:':'Centro:',`${S.name||'—'} (${typeLabel()})`)+
    r(va?'Codi:':'Código:',S.code||'—')+
    r(va?'Etapes:':'Etapas:',stN.join(', ')||'—')+
    r(va?'Docents:':'Docentes:',S.num||'—')+
    r(va?'Nivell majoritari:':'Nivel mayoritario:',lvName)+
    r(va?'Coordinador/a:':'Coordinador/a:',S.contactName||'—')+
    r(va?'Correu:':'Correo:',S.contactEmail||'—')+
    r(va?'Àrees:':'Áreas:',arN.join(', ')||'—')+
    r(va?'Modalitat:':'Modalidad:',S.modality||'—')+
    r(va?'Hores:':'Horas:',(S.hours||30)+'h')+
    r(va?'Participació:':'Participación:',S.participation||'PUC')+
    r(va?'Mòduls:':'Módulos:',`${ord.length} (${AUTO.length} ${va?'transversals':'transversales'} + ${chosen} ${va?'triats':'elegidos'})`);

  let html=ord.map((n,i)=>{
    const line=LINES.find(l=>l.n===n);
    const ct=CONTENTS[n]||[];
    const ex=getLineExamples(n);
    const exHtml=ex.length?`<div style="margin-top:0.7rem;padding-top:0.7rem;border-top:1px dashed var(--border);">
      <div style="font-family:'Syne',sans-serif;font-weight:700;font-size:0.78rem;color:#3a7a5a;margin-bottom:0.4rem;">💡 ${va?'Exemples pràctics':'Ejemplos prácticos'}</div>
      <ul style="margin:0;padding-left:1.1rem;">${ex.map(e=>`<li style="font-size:0.8rem;color:var(--text-muted);line-height:1.5;margin-bottom:0.2rem;">${e}</li>`).join('')}</ul>
    </div>`:'';
    const tv=AUTO.includes(n)?`<span style="display:inline-block;margin-left:0.4rem;padding:0.05rem 0.4rem;border-radius:999px;background:rgba(255,255,255,0.22);font-size:0.6rem;font-weight:700;vertical-align:middle;">TRANSVERSAL</span>`:'';
    return `<div class="mod-block"><div class="mod-head"><div class="mod-num">${String(i+1).padStart(2,'0')}</div><div class="mod-title">${line?line[lang]:'Línia '+n}${tv}</div></div>
    <div class="mod-body"><ul>${ct.map(x=>`<li>${x[lang]}</li>`).join('')}</ul>
    <div class="mod-tag">${CATS[line?.cat]?.[lang]||''}</div>${exHtml}</div></div>`;
  }).join('');

  if(S.obs){
    html+=`<div class="mod-block" style="border-color:#b08a40;"><div class="mod-head" style="background:linear-gradient(135deg,#6a5a20,#8a7a40);"><div class="mod-num">💬</div><div class="mod-title">${va?'Necessitats formatives addicionals indicades pel centre':'Necesidades formativas adicionales indicadas por el centro'}</div></div><div class="mod-body"><p style="font-size:0.86rem;line-height:1.55;margin:0;">${S.obs.replace(/\n/g,'<br>')}</p><div class="mod-tag">${va?'A valorar pel CEFIRE':'A valorar por el CEFIRE'}</div></div></div>`;
  }

  mc.innerHTML=html;
}

const TOTAL=6;
function updType(){
  const w=document.getElementById('typeOtherWrap');
  if(w) w.style.display=document.getElementById('fType').value==='OTHER'?'block':'none';
}

function updModality(){
  const m=document.getElementById('fModality').value;
  const h=document.getElementById('fHours');
  const hint=document.getElementById('hoursHint');
  if(m==='PFC'){h.min=30;h.max=60;h.value=h.value||'30';h.placeholder='30';
    hint.setAttribute('data-va','PFC: de 30 a 60 hores. Implica una part significativa del claustre i es vincula a les propostes de millora del centre. Pot comptar amb ponents externs per a una part de les sessions. Verifica els requisits exactes a la Resolució vigent.');
    hint.setAttribute('data-es','PFC: de 30 a 60 horas. Implica una parte significativa del claustro y se vincula a las propuestas de mejora del centro. Puede contar con ponentes externos para una parte de las sesiones. Verifica los requisitos exactos en la Resolución vigente.');
  } else if(m==='SEM'){h.min=20;h.max=30;h.value=h.value||'20';h.placeholder='20';
    hint.setAttribute('data-va','Seminari: de 20 a 30 hores. Grup de docents que aprofundix en un tema amb el suport puntual d\'una persona experta. Verifica el nombre mínim de participants a la Resolució vigent.');
    hint.setAttribute('data-es','Seminario: de 20 a 30 horas. Grupo de docentes que profundiza en un tema con el apoyo puntual de una persona experta. Verifica el número mínimo de participantes en la Resolución vigente.');
  } else if(m==='GT'){h.min=20;h.max=30;h.value=h.value||'20';h.placeholder='20';
    hint.setAttribute('data-va','Grup de Treball: de 20 a 30 hores. Treball col·laboratiu i autoformatiu entre docents, sense ponents externs. Verifica el nombre mínim de participants a la Resolució vigent.');
    hint.setAttribute('data-es','Grupo de Trabajo: de 20 a 30 horas. Trabajo colaborativo y autoformativo entre docentes, sin ponentes externos. Verifica el número mínimo de participantes en la Resolución vigente.');
  } else {
    hint.setAttribute('data-va','');hint.setAttribute('data-es','');
  }
  tAll();
}

function renderStep(){clearVal();
  document.querySelectorAll('.step-card').forEach((c,i)=>c.classList.toggle('hidden',i!==step));
  const seq=activeSteps();const cur=seq.indexOf(step);
  document.getElementById('stepsBar').innerHTML=seq.map((s,i)=>
    `<div class="step-dot${i<cur?' done':''}${i===cur?' active':''}"></div>`).join('');
  document.getElementById('prevBtn').classList.toggle('hidden',cur===0);
  document.getElementById('nextBtn').classList.toggle('hidden',cur===seq.length-1);
  document.getElementById('nextBtn').textContent=lang==='va'?'Següent →':'Siguiente →';
  document.getElementById('pdfBtn').classList.toggle('hidden',cur!==seq.length-1);
  document.getElementById('pdfBtn').textContent=lang==='va'?'⬇ Descarregar PDF':'⬇ Descargar PDF';

  if(step===0) renderChips('stagesGrid',STAGES,'stages');
  if(step===1){
    S.num=parseInt(document.getElementById('fNum')?.value)||S.num;
    renderDist('levelDist',LEVELS,'levels','levelTotal','levelTarget','levelCheck');
    renderDist('priorDist',PRIOR,'prior','priorTotal','priorTarget','priorCheck');
    renderDist('copilotDist',COPILOT,'copilot','copilotTotal','copilotTarget','copilotCheck');
  }
  if(step===2) renderUsage();
  if(step===3){renderChips('areasGrid',AREAS,'areas');renderLines();}
  if(step===5) renderResult();
  tAll();
  }
function scrollTop(){window.scrollTo({top:0,behavior:'smooth'});}

function clearVal(){document.getElementById('valWarn').className='val-warn';document.querySelectorAll('.fg.invalid').forEach(f=>f.classList.remove('invalid'));}

function showVal(msg){
  const w=document.getElementById('valWarn');
  w.textContent=msg;w.className='val-warn show';
  w.scrollIntoView({behavior:'smooth',block:'center'});
}

function markInvalid(id){const el=document.getElementById(id);if(el){const fg=el.closest('.fg');if(fg)fg.classList.add('invalid');}}

function validateStep(){
  clearVal();
  const va=lang==='va';
  if(step===0){
    const name=document.getElementById('fName').value;
    const type=document.getElementById('fType').value;
    const num=parseInt(document.getElementById('fNum').value)||0;
    const cName=document.getElementById('fContactName').value;
    const cEmail=document.getElementById('fContactEmail').value;
    const mod=document.getElementById('fModality').value;
    const hrs=parseInt(document.getElementById('fHours').value)||0;
    if(!name){markInvalid('fName');showVal(va?'Indica el nom del centre.':'Indica el nombre del centro.');return false;}
    if(!type){markInvalid('fType');showVal(va?'Selecciona el tipus de centre.':'Selecciona el tipo de centro.');return false;}
    if(type==='OTHER'&&!document.getElementById('fTypeOther').value.trim()){markInvalid('fTypeOther');showVal(va?'Especifica el tipus de centre.':'Especifica el tipo de centro.');return false;}
    if(S.stages.length===0){showVal(va?'Selecciona almenys una etapa educativa.':'Selecciona al menos una etapa educativa.');return false;}
    if(!num||num<1){markInvalid('fNum');showVal(va?'Indica el nombre de docents participants.':'Indica el número de docentes participantes.');return false;}
    if(!cName){markInvalid('fContactName');showVal(va?'Indica el nom del coordinador/a de l\'acció formativa.':'Indica el nombre del coordinador/a de l\'acció formativa.');return false;}
    if(!cEmail||!cEmail.includes('@')){markInvalid('fContactEmail');showVal(va?'Indica el correu electrònic del coordinador/a.':'Indica el correo electrónico del coordinador/a.');return false;}
    if(!mod){markInvalid('fModality');showVal(va?'Selecciona la modalitat formativa.':'Selecciona la modalidad formativa.');return false;}
    if(!hrs||hrs<20){markInvalid('fHours');showVal(va?'Indica les hores de la formació (mínim 20h).':'Indica las horas de la formación (mínimo 20h).');return false;}
    return true;
  }
  if(step===1){
    const lt=Object.values(S.levels).reduce((a,b)=>a+b,0);
    if(lt===0){showVal(va?'Distribuïx el professorat per nivell de coneixement en IA.':'Distribuye el profesorado por nivel de conocimiento en IA.');return false;}
    if(lt!==S.num){showVal(va?'El total de la distribució per nivell ('+lt+') no coincideix amb el nombre de docents ('+S.num+').':'El total de la distribución por nivel ('+lt+') no coincide con el número de docentes ('+S.num+').');return false;}
    return true;
  }
  if(step===2){
    if(S.usage.length===0){showVal(va?'Selecciona almenys una opció sobre l\'ús actual de la IA.':'Selecciona al menos una opción sobre el uso actual de la IA.');return false;}
    return true;
  }
  if(step===3){
    if(S.areas.length===0){showVal(va?'Selecciona almenys una àrea vinculada a la formació.':'Selecciona al menos un área vinculada a la formación.');return false;}
    if(S.lines.filter(n=>!AUTO.includes(n)).length===0){showVal(va?'Selecciona almenys una línia de formació (a banda de les dues incloses per defecte).':'Selecciona al menos una línea de formación (además de las dos incluidas por defecto).');return false;}
    const chosen=S.lines.filter(n=>!AUTO.includes(n));
    if(chosen.length>5){showVal(va?'Les línies d\'Alfabetització bàsica en IA i d\'Ètica i protecció de dades ja s\'inclouen sempre per ser transversals. A banda d\'estes, pots triar un màxim de 5 línies i n\'has triat '+chosen.length+'. Elimina\'n '+(chosen.length-5)+' per a continuar.':'Las líneas de Alfabetización básica en IA y de Ética y protección de datos ya se incluyen siempre por ser transversales. Además de estas, puedes elegir un máximo de 5 líneas y has elegido '+chosen.length+'. Elimina '+(chosen.length-5)+' para continuar.');return false;}
    return true;
  }
  return true;
}

// El pas 2 (us actual de la IA al centre) nomes s'aplica als PFC.
function skipUsage(){return S.modality==='SEM'||S.modality==='GT';}
function activeSteps(){
  const all=[0,1,2,3,4,5];
  return skipUsage()?all.filter(s=>s!==2):all;
}
function saveStep(){
  if(step===0){S.name=document.getElementById('fName').value;S.code=document.getElementById('fCode').value;S.type=document.getElementById('fType').value;S.typeOther=document.getElementById('fTypeOther')?.value||'';S.num=parseInt(document.getElementById('fNum').value)||0;S.contactName=document.getElementById('fContactName').value;S.contactEmail=document.getElementById('fContactEmail').value;S.modality=document.getElementById('fModality').value;S.hours=parseInt(document.getElementById('fHours').value)||30;S.participation=document.getElementById('fParticipation').value;}
  if(step===3){S.obs=document.getElementById('fObs')?.value||'';S.areaOther=document.getElementById('fAreaOther')?.value||'';}
}
function nextStep(){
  if(!validateStep()) return;
  saveStep();
  const seq=activeSteps();
  const i=seq.indexOf(step);
  if(i>-1&&i<seq.length-1){step=seq[i+1];renderStep();scrollTop();}
}
function prevStep(){
  clearVal();
  const seq=activeSteps();
  const i=seq.indexOf(step);
  if(i>0){step=seq[i-1];renderStep();scrollTop();}
}

// PDF
document.getElementById('pdfBtn').addEventListener('click',()=>{
  const{jsPDF}=window.jspdf;const d=new jsPDF({unit:'mm',format:'a4'});
  const W=210,M=20,CW=W-2*M;let y=M;
  const va=lang==='va';
  // jsPDF (helvetica) no admet emojis: els eliminem de tot el text del PDF
  const T=s=>String(s==null?'':s).replace(/[\u{1F000}-\u{1FAFF}\u{2190}-\u{27BF}\u{2B00}-\u{2BFF}\u{FE0E}\u{FE0F}\u{2600}-\u{26FF}]/gu,'').replace(/\s{2,}/g,' ').trim();
  function chk(n){if(y+n>275){d.addPage();y=M;}}

  // Portada
  d.setFillColor(27,42,58);d.rect(0,0,W,52,'F');
  d.setTextColor(255);d.setFont('helvetica','bold');d.setFontSize(19);
  d.text(va?'Proposta PAF · IA en educacio':'Propuesta PAF · IA en educacion',W/2,24,{align:'center'});
  d.setFontSize(9.5);d.setFont('helvetica','normal');
  d.text("CEFIRE d'Intel.ligencia Artificial i Pensament Computacional",W/2,33,{align:'center'});
  d.text("Conselleria d'Educacio, Universitats i Ocupacio · Generalitat Valenciana",W/2,40,{align:'center'});
  y=62;

  // Resum del centre (idèntic a pantalla)
  d.setTextColor(27,42,58);d.setFontSize(13);d.setFont('helvetica','bold');
  d.text(va?'Resum del centre':'Resumen del centro',M,y);y+=7;
  d.setFontSize(9.5);
  const stN=S.stages.map(s=>T(STAGES.find(st=>st.id===s)?.[lang])).filter(Boolean);
  const majorLevel=Object.entries(S.levels).sort((a,b)=>b[1]-a[1])[0]?.[0]||'zero';
  const lvName=T(LEVELS.find(l=>l.id===majorLevel)?.[lang])||'-';
  const arL=S.areas.map(a=>{const ar=AREAS.find(x=>x.id===a);return T(ar?ar[lang]:a);}).filter(Boolean);
  if(S.areas.includes('other')&&S.areaOther){const i=arL.findIndex(x=>x&&x.indexOf('(')>-1);if(i>-1)arL[i]=T(S.areaOther);}
  const arN=arL.join(', ')||'-';
  const ordPre=buildModules();
  const chosenN=ordPre.filter(n=>!AUTO.includes(n)).length;
  const rows=[
    [va?'Centre':'Centro',T(`${S.name||'-'} (${typeLabel()})`)],
    [va?'Codi':'Codigo',T(S.code)||'-'],
    [va?'Etapes':'Etapas',stN.join(', ')||'-'],
    [va?'Docents':'Docentes',String(S.num||'-')],
    [va?'Nivell majoritari':'Nivel mayoritario',lvName],
    [va?'Coordinador/a':'Coordinador/a',T(S.contactName)||'-'],
    [va?'Correu':'Correo',T(S.contactEmail)||'-'],
    [va?'Arees':'Areas',arN],
    [va?'Moduls':'Modulos',`${ordPre.length} (${AUTO.length} ${va?'transversals':'transversales'} + ${chosenN} ${va?'triats':'elegidos'})`],
    [va?'Modalitat':'Modalidad',T(S.modality)||'-'],
    [va?'Hores':'Horas',(S.hours||30)+'h'],
    [va?'Participacio':'Participacion',S.participation||'PUC'],
  ];
  rows.forEach(([k,v])=>{
    chk(6);
    d.setFont('helvetica','bold');d.text(k+':',M,y);
    d.setFont('helvetica','normal');
    const vl=d.splitTextToSize(String(v),CW-38);
    d.text(vl,M+38,y);y+=5.5*vl.length;
  });

  // Distribució per nivell
  y+=3;chk(28);
  d.setFont('helvetica','bold');d.text(va?'Distribucio per nivell:':'Distribucion por nivel:',M,y);y+=5;
  d.setFont('helvetica','normal');
  LEVELS.forEach(l=>{chk(5);d.text(`${T(l[lang])}: ${S.levels[l.id]||0}`,M+4,y);y+=4.5;});
  y+=4;

  // Mòduls (mateixa llista que la pantalla)
  const ord=ordPre;
  chk(12);
  d.setFontSize(13);d.setFont('helvetica','bold');d.setTextColor(27,42,58);
  d.text(va?'Moduls formatius':'Modulos formativos',M,y);y+=7;

  ord.forEach((n,i)=>{
    const line=LINES.find(l=>l.n===n);
    const ct=CONTENTS[n]||[];
    const exs=getLineExamples(n);
    chk(14);
    // Capçalera del mòdul
    d.setFillColor(27,42,58);d.roundedRect(M,y-1,CW,8,1.5,1.5,'F');
    d.setFontSize(9.5);d.setFont('helvetica','bold');d.setTextColor(255,255,255);
    d.text(T(`${String(i+1).padStart(2,'0')}. ${line?line[lang]:''}${AUTO.includes(n)?(va?' (transversal)':' (transversal)'):''}`),M+3,y+4.5);
    y+=11;
    // Continguts
    d.setFontSize(8.5);d.setFont('helvetica','normal');d.setTextColor(96,112,128);
    ct.forEach(x=>{
      const ln=d.splitTextToSize('- '+T(x[lang]),CW-8);
      chk(4.5*ln.length);d.text(ln,M+5,y);y+=4.5*ln.length;
    });
    // Hores
    d.setFontSize(8);d.setFont('helvetica','bold');d.setTextColor(74,106,154);
    chk(5);d.text(T(CATS[line?.cat]?.[lang]||''),M+5,y);y+=5.5;
    // Exemples pràctics (idèntics a la pantalla)
    if(exs.length){
      d.setFontSize(8.5);d.setFont('helvetica','bold');d.setTextColor(58,122,90);
      chk(5);d.text(va?'Exemples practics:':'Ejemplos practicos:',M+5,y);y+=4.5;
      d.setFontSize(8);d.setFont('helvetica','normal');d.setTextColor(96,112,128);
      exs.forEach(e=>{
        const ln=d.splitTextToSize('- '+T(e),CW-12);
        chk(4*ln.length);d.text(ln,M+8,y);y+=4*ln.length;
      });
    }
    y+=4;
  });

  // Observacions (bloc final, com a la pantalla)
  if(S.obs){
    chk(16);
    d.setFillColor(106,90,32);d.roundedRect(M,y-1,CW,8,1.5,1.5,'F');
    d.setFontSize(9.5);d.setFont('helvetica','bold');d.setTextColor(255,255,255);
    d.text(va?'Necessitats formatives addicionals indicades pel centre':'Necesidades formativas adicionales indicadas por el centro',M+3,y+4.5);
    y+=11;
    d.setFontSize(8.5);d.setFont('helvetica','normal');d.setTextColor(96,112,128);
    const ol=d.splitTextToSize(T(S.obs),CW-8);
    ol.forEach(ln=>{chk(4.5);d.text(ln,M+5,y);y+=4.5;});
    d.setFontSize(8);d.setFont('helvetica','bold');d.setTextColor(176,138,64);
    chk(5);d.text(va?'A valorar pel CEFIRE':'A valorar por el CEFIRE',M+5,y);y+=6;
  }

  chk(14);y+=3;d.setDrawColor(212,227,237);d.line(M,y,W-M,y);y+=5;
  d.setFontSize(7.5);d.setTextColor(100,100,100);d.setFont('helvetica','normal');
  d.text("CC BY-NC-SA 4.0 · CEFIRE IA i PC · Generalitat Valenciana · 2026",W/2,y,{align:'center'});
  d.save(`PAF_IA_${(S.name||'centre').replace(/\s+/g,'_')}.pdf`);
});

  lang=l;
  const dl=document.getElementById('dogvLink');
  if(dl) dl.href='https://dogv.gva.es/'+(l==='va'?'va':'es')+'/resultat-dogv?signatura=2026/24401';
  renderStep();
}
renderStep();
setLang('va');
</script>
