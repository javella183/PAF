<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Dissenyador PAF · Formació en IA per a centres educatius</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root{--accent:#9bb8d8;--accent-green:#c8e0b0;--text:#1b2a3a;--text-muted:#607080;--border:#d4e3ed;--shadow:0 10px 30px rgba(27,42,58,0.07);--info-bg:#eef3f9}
*{box-sizing:border-box}html{scroll-behavior:smooth}
body{margin:0;background:linear-gradient(135deg,#eef5e8 0%,#e8eef5 50%,#e4e0f0 100%);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh}
header{position:sticky;top:0;z-index:20;display:flex;align-items:center;justify-content:space-between;min-height:58px;padding:0 1.5rem;background:rgba(27,42,58,0.97);backdrop-filter:blur(10px);box-shadow:0 6px 24px rgba(0,0,0,0.15)}
.brand{display:flex;align-items:center;gap:0.8rem}
.brand-logo{height:28px;filter:brightness(0) invert(1)}
.lang-sw{display:flex;gap:0.4rem}
.lang-b{border:1px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.7);padding:0.35rem 0.85rem;border-radius:999px;font-family:'Syne',sans-serif;font-size:0.78rem;font-weight:700;cursor:pointer;transition:0.18s}
.lang-b.active,.lang-b:hover{background:var(--accent);border-color:var(--accent);color:#12202a}
main{max-width:880px;margin:0 auto;padding:1.5rem 1.5rem 3rem}
.hero{text-align:center;background:radial-gradient(circle at top right,rgba(180,196,222,0.3),transparent 40%),linear-gradient(135deg,#1b2a3a 0%,#2a3650 100%);color:#fff;border-radius:24px;padding:2rem;margin-bottom:1.5rem;box-shadow:0 18px 40px rgba(27,42,58,0.15)}
.hero h1{margin:0;font-family:'Syne',sans-serif;font-size:clamp(1.3rem,3vw,1.9rem)}
.hero p{margin:0.4rem 0 0;color:rgba(255,255,255,0.6);font-size:0.85rem}
.steps-bar{display:flex;gap:0.3rem;margin-bottom:1.5rem}
.step-dot{flex:1;height:6px;border-radius:99px;background:#d4e3ed;transition:0.4s}
.step-dot.done{background:var(--accent-green)}.step-dot.active{background:var(--accent)}
.card{background:rgba(255,255,255,0.94);border:1px solid var(--border);border-radius:20px;padding:1.6rem;box-shadow:var(--shadow);margin-bottom:1rem}
.card h2{margin:0 0 0.2rem;font-family:'Syne',sans-serif;font-size:1.2rem}
.card .sub{color:var(--text-muted);font-size:0.86rem;margin-bottom:1.1rem;line-height:1.5}
.q-explain{background:var(--info-bg);border-radius:12px;padding:0.8rem 1rem;margin-bottom:1.1rem;font-size:0.84rem;line-height:1.55;color:var(--text-muted);border-left:3px solid var(--accent)}
.fg{margin-bottom:1rem}
.fg label{display:block;font-family:'Syne',sans-serif;font-weight:700;font-size:0.84rem;margin-bottom:0.35rem}
.fg input,.fg select,.fg textarea{width:100%;padding:0.6rem 0.85rem;border:1.5px solid var(--border);border-radius:12px;font-family:'DM Sans',sans-serif;font-size:0.88rem;color:var(--text);background:#fff;transition:0.18s}
.fg input:focus,.fg select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(155,184,216,0.15)}
.chip-grid{display:flex;flex-wrap:wrap;gap:0.45rem}
.chip{display:inline-flex;align-items:center;gap:0.35rem;padding:0.45rem 0.8rem;border:1.5px solid var(--border);border-radius:12px;font-size:0.82rem;cursor:pointer;transition:0.18s;background:#fff;user-select:none;line-height:1.25}
.chip:hover{border-color:var(--accent);background:rgba(155,184,216,0.06)}
.chip.selected{border-color:var(--accent);background:rgba(155,184,216,0.14);font-weight:600}
.chip .ck{width:17px;height:17px;border-radius:5px;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:0.65rem;transition:0.18s;flex:0 0 17px}
.chip.selected .ck{background:var(--accent);border-color:var(--accent);color:#fff}

/* Distribution row */
.dist-group{margin-bottom:1.2rem}
.dist-label{font-family:'Syne',sans-serif;font-weight:700;font-size:0.84rem;margin-bottom:0.5rem}
.dist-sub{font-size:0.8rem;color:var(--text-muted);margin-bottom:0.6rem}
.dist-row{display:flex;align-items:center;gap:0.7rem;padding:0.55rem 0;border-bottom:1px solid #eef3f9}
.dist-row:last-child{border-bottom:none}
.dist-icon{font-size:1.1rem;flex:0 0 24px;text-align:center}
.dist-name{flex:1;font-size:0.86rem;line-height:1.3}
.dist-input{width:70px;padding:0.4rem 0.5rem;border:1.5px solid var(--border);border-radius:8px;font-size:0.88rem;text-align:center;font-family:'DM Sans',sans-serif}
.dist-input:focus{outline:none;border-color:var(--accent)}
.dist-total{display:flex;justify-content:flex-end;gap:0.5rem;padding-top:0.5rem;font-family:'Syne',sans-serif;font-size:0.82rem;font-weight:700}
.dist-total .ok{color:var(--accent-green)}.dist-total .warn{color:#c0392b}

/* Lines */
.line-card{border:1.5px solid var(--border);border-radius:14px;padding:0.75rem 1rem;margin-bottom:0.45rem;cursor:pointer;transition:0.2s;display:flex;align-items:flex-start;gap:0.65rem;background:#fff}
.line-card:hover{border-color:var(--accent);background:rgba(155,184,216,0.04)}
.line-card.selected{border-color:var(--accent);background:rgba(155,184,216,0.1)}
.line-card .ln{flex:0 0 26px;width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:0.7rem;font-weight:800;background:#eef3f9;color:var(--text);transition:0.18s}
.line-card.selected .ln{background:var(--accent);color:#fff}
.line-card .lt{font-size:0.85rem;line-height:1.3}
.cat-label{font-family:'Syne',sans-serif;font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:var(--text-muted);margin:0.9rem 0 0.4rem;padding-left:0.2rem}

.nav-btns{display:flex;gap:0.8rem;justify-content:flex-end;margin-top:1.3rem}
.btn{padding:0.6rem 1.4rem;border:none;border-radius:12px;font-family:'Syne',sans-serif;font-weight:700;font-size:0.86rem;cursor:pointer;transition:0.18s}
.btn-primary{background:var(--text);color:#fff}.btn-primary:hover{background:#2a4054}
.btn-secondary{background:transparent;color:var(--text);border:1.5px solid var(--border)}.btn-secondary:hover{border-color:var(--accent)}
.btn-accent{background:linear-gradient(135deg,#3a8a5a,#4a9a6a);color:#fff}.btn-accent:hover{opacity:0.9}

.mod-block{border:1.5px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:0.7rem;background:#fff}
.mod-head{display:flex;align-items:center;gap:0.7rem;padding:0.8rem 1rem;background:linear-gradient(135deg,#1b2a3a,#2a3650);color:#fff}
.mod-num{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,0.18);font-family:'Syne',sans-serif;font-size:0.75rem;font-weight:800;flex:0 0 28px}
.mod-title{font-family:'Syne',sans-serif;font-weight:700;font-size:0.88rem}
.mod-body{padding:0.8rem 1rem}
.mod-body ul{margin:0;padding-left:1.1rem}.mod-body li{font-size:0.82rem;line-height:1.5;margin-bottom:0.2rem}
.mod-tag{display:inline-block;padding:0.1rem 0.45rem;border-radius:999px;font-size:0.66rem;font-family:'Syne',sans-serif;font-weight:700;background:rgba(155,184,216,0.15);color:#4a6a9a;margin-top:0.3rem}
.summary-box{background:var(--info-bg);border-radius:14px;padding:1rem;margin-bottom:1rem}
.summary-row{display:flex;gap:0.5rem;margin-bottom:0.35rem;font-size:0.84rem}
.summary-label{font-family:'Syne',sans-serif;font-weight:700;min-width:130px}
.summary-value{color:var(--text-muted)}

.hidden{display:none}
@media(max-width:640px){
  header{padding:0.5rem 0.8rem}.brand-logo{height:22px}
  main{padding:1rem 0.8rem 2.5rem}.hero{padding:1.2rem 1rem;border-radius:16px}
  .card{padding:1.1rem;border-radius:16px}
  .dist-row{flex-wrap:wrap;gap:0.4rem}.dist-input{width:60px}
  .nav-btns{flex-direction:column}.btn{width:100%;text-align:center}
}
</style>
</head>

<main>
  <section class="hero">
    <h1 data-va="Dissenyador del PAF en Intel·ligència Artificial" data-es="Diseñador del PAF en Inteligencia Artificial"></h1>
    <p data-va="Programa Anual de Formació en centres · CEFIRE IA i PC" data-es="Programa Anual de Formación en centros · CEFIRE IA i PC"></p>
  </section>
  <div class="steps-bar" id="stepsBar"></div>

  <!-- STEP 0: Centre -->
  <div class="card step-card" data-step="0">
    <h2 data-va="1. Dades del centre" data-es="1. Datos del centro"></h2>
    <p class="sub" data-va="Informació bàsica per a personalitzar la proposta formativa del vostre centre." data-es="Información básica para personalizar la propuesta formativa de vuestro centro."></p>
    <div class="q-explain" data-va="Estes dades ens permeten adaptar la formació al tipus de centre, les etapes que impartiu i la grandària del claustre. No es guarden ni s'envien a cap servidor." data-es="Estos datos nos permiten adaptar la formación al tipo de centro, las etapas que impartís y el tamaño del claustro. No se guardan ni se envían a ningún servidor."></div>
    <div class="fg"><label data-va="Nom del centre" data-es="Nombre del centro"></label><input type="text" id="fName"></div>
    <div class="fg"><label data-va="Tipus de centre" data-es="Tipo de centro"></label>
      <select id="fType"><option value="">—</option>
        <option value="CEIP">CEIP</option><option value="IES">IES</option><option value="CEO">CEO</option>
        <option value="CIPFP">CIPFP</option><option value="FPA">FPA</option><option value="EOI">EOI</option>
        <option value="CEE">CEE</option><option value="CONSERVATORI">Conservatori</option>
        <option value="EASD">EASD</option><option value="OTHER">Altre</option>
      </select>
    </div>
    <div class="fg"><label data-va="Etapes educatives" data-es="Etapas educativas"></label><div class="chip-grid" id="stagesGrid"></div></div>
    <div class="fg"><label data-va="Nombre total de docents que participaran en la formació" data-es="Número total de docentes que participarán en la formación"></label><input type="number" id="fNum" min="1" max="500" placeholder="25"></div>
    <div class="fg"><label data-va="Coordinador/a PAF (nom i correu)" data-es="Coordinador/a PAF (nombre y correo)"></label><input type="text" id="fContact"></div>
  </div>

  <!-- STEP 1: Level distribution -->
  <div class="card step-card hidden" data-step="1">
    <h2 data-va="2. Nivell actual del claustre en IA" data-es="2. Nivel actual del claustro en IA"></h2>
    <p class="sub" data-va="Distribuïx el professorat del centre segons el seu nivell, experiència prèvia i ús de Copilot." data-es="Distribuye el profesorado del centro según su nivel, experiencia previa y uso de Copilot."></p>
    <div class="q-explain" data-va="Indica quants docents (dels que has indicat al pas anterior) se situen en cada nivell. Açò ens ajuda a calibrar la dificultat i el punt de partida dels mòduls. Els totals han de sumar el nombre de docents del centre." data-es="Indica cuántos docentes (de los que has indicado en el paso anterior) se sitúan en cada nivel. Esto nos ayuda a calibrar la dificultad y el punto de partida de los módulos. Los totales deben sumar el número de docentes del centro."></div>

    <div class="dist-group">
      <div class="dist-label" data-va="Nivell de coneixement en IA" data-es="Nivel de conocimiento en IA"></div>
      <div class="dist-sub" data-va="Quants docents se situen en cada nivell?" data-es="¿Cuántos docentes se sitúan en cada nivel?"></div>
      <div id="levelDist"></div>
      <div class="dist-total"><span data-va="Total:" data-es="Total:"></span><span id="levelTotal">0</span>/<span id="levelTarget">0</span> <span id="levelCheck"></span></div>
    </div>

    <div class="dist-group">
      <div class="dist-label" data-va="Formació prèvia en IA" data-es="Formación previa en IA"></div>
      <div class="dist-sub" data-va="Quants docents han rebut cada tipus de formació?" data-es="¿Cuántos docentes han recibido cada tipo de formación?"></div>
      <div id="priorDist"></div>
      <div class="dist-total"><span data-va="Total:" data-es="Total:"></span><span id="priorTotal">0</span>/<span id="priorTarget">0</span> <span id="priorCheck"></span></div>
    </div>

    <div class="dist-group">
      <div class="dist-label" data-va="Ús de Copilot @edu.gva.es" data-es="Uso de Copilot @edu.gva.es"></div>
      <div class="dist-sub" data-va="Quants docents utilitzen Copilot amb el compte corporatiu?" data-es="¿Cuántos docentes utilizan Copilot con la cuenta corporativa?"></div>
      <div id="copilotDist"></div>
      <div class="dist-total"><span data-va="Total:" data-es="Total:"></span><span id="copilotTotal">0</span>/<span id="copilotTarget">0</span> <span id="copilotCheck"></span></div>
    </div>
  </div>

  <!-- STEP 2: Current usage -->
  <div class="card step-card hidden" data-step="2">
    <h2 data-va="3. Com s'utilitza la IA actualment al centre?" data-es="3. ¿Cómo se utiliza la IA actualmente en el centro?"></h2>
    <p class="sub" data-va="Selecciona les opcions que reflectixen l'ús actual que fa el professorat de la IA." data-es="Selecciona las opciones que reflejan el uso actual que hace el profesorado de la IA."></p>
    <div class="q-explain" data-va="Saber d'on partiu ens permet identificar llacunes i evitar repetir continguts que ja domineu. Marca tot el que ja estigueu fent, encara que siga de forma puntual." data-es="Saber de dónde partís nos permite identificar lagunas y evitar repetir contenidos que ya domináis. Marca todo lo que ya estéis haciendo, aunque sea de forma puntual."></div>
    <div class="chip-grid" id="usageGrid"></div>
  </div>

  <!-- STEP 3: Training lines -->
  <div class="card step-card hidden" data-step="3">
    <h2 data-va="4. En quines línies de formació voleu formar-vos?" data-es="4. ¿En qué líneas de formación queréis formaros?"></h2>
    <p class="sub" data-va="Selecciona les línies que us interessen per al vostre PAF (recomanem 3-6 per curs)." data-es="Selecciona las líneas que os interesen para vuestro PAF (recomendamos 3-6 por curso)."></p>
    <div class="q-explain" data-va="Estes són les 22 línies formatives disponibles, organitzades per temàtica. A l'últim pas es generarà una proposta estructurada amb mòduls i continguts basada en les vostres seleccions i en el nivell del claustre." data-es="Estas son las 22 líneas formativas disponibles, organizadas por temática. En el último paso se generará una propuesta estructurada con módulos y contenidos basada en vuestras selecciones y en el nivel del claustro."></div>
    <div id="linesContainer"></div>
  </div>

  <!-- STEP 4: Result -->
  <div class="card step-card hidden" data-step="4">
    <h2 data-va="📋 Proposta formativa PAF" data-es="📋 Propuesta formativa PAF"></h2>
    <p class="sub" data-va="Estructura de mòduls generada a partir de les respostes del centre." data-es="Estructura de módulos generada a partir de las respuestas del centro."></p>
    <div class="summary-box" id="summaryBox"></div>
    <div id="modulesContainer"></div>
  </div>

  <div class="nav-btns" id="navBtns">
    <button class="btn btn-secondary hidden" id="prevBtn" onclick="prevStep()">← Anterior</button>
    <button class="btn btn-primary" id="nextBtn" onclick="nextStep()"></button>
    <button class="btn btn-accent hidden" id="pdfBtn">⬇ PDF</button>
  </div>

let lang='va',step=0;
const S={name:'',type:'',stages:[],num:0,contact:'',levels:{zero:0,basic:0,inter:0,adv:0},prior:{none:0,self:0,cefire:0,external:0},copilot:{no:0,some:0,yes:0},usage:[],lines:[]};

function t(el){if(!el)return;const v=el.getAttribute('data-'+lang);if(v)el.textContent=v;}
function tAll(){document.querySelectorAll('[data-va]').forEach(t);document.querySelectorAll('.lang-b').forEach(b=>b.classList.toggle('active',b.textContent.includes(lang==='va'?'Val':'Cast')));}

function renderChips(cid,items,sk){
  const c=document.getElementById(cid);
  c.innerHTML=items.map(it=>{
    const sel=S[sk].includes(it.id);
    return `<div class="chip${sel?' selected':''}" onclick="togChip('${sk}','${it.id}')">
      <span class="ck">${sel?'✓':''}</span><span>${it.icon?it.icon+' ':''}${it[lang]}</span></div>`;
  }).join('');
}
function togChip(sk,id){const i=S[sk].indexOf(id);i===-1?S[sk].push(id):S[sk].splice(i,1);renderStep();}

function renderDist(cid,items,sk,totalId,targetId,checkId){
  const c=document.getElementById(cid);
  c.innerHTML=items.map(it=>`<div class="dist-row">
    <span class="dist-icon">${it.icon}</span>
    <span class="dist-name">${it[lang]}</span>
    <input class="dist-input" type="number" min="0" max="500" value="${S[sk][it.id]||0}" onchange="updDist('${sk}','${it.id}',this.value,'${totalId}','${targetId}','${checkId}')">
  </div>`).join('');
  updDistTotals(sk,totalId,targetId,checkId);
}
function updDist(sk,id,v,tid,tgid,ckid){S[sk][id]=parseInt(v)||0;updDistTotals(sk,tid,tgid,ckid);}
function updDistTotals(sk,tid,tgid,ckid){
  const total=Object.values(S[sk]).reduce((a,b)=>a+b,0);
  document.getElementById(tid).textContent=total;
  document.getElementById(tgid).textContent=S.num;
  const el=document.getElementById(ckid);
  if(total===S.num&&S.num>0){el.textContent='✅';el.className='ok';}
  else if(total>S.num){el.textContent='⚠️';el.className='warn';}
  else{el.textContent='';el.className='';}
}

function renderLines(){
  const c=document.getElementById('linesContainer');
  let h='';
  ['bases','peda','crea','tech','spec'].forEach(cat=>{
    h+=`<div class="cat-label">${CATS[cat][lang]}</div>`;
    LINES.filter(l=>l.cat===cat).forEach(l=>{
      const sel=S.lines.includes(l.n);
      h+=`<div class="line-card${sel?' selected':''}" onclick="togLine(${l.n})">
        <div class="ln">${sel?'✓':l.n}</div><div class="lt">${l[lang]}</div></div>`;
    });
  });
  c.innerHTML=h;
}
function togLine(n){const i=S.lines.indexOf(n);i===-1?S.lines.push(n):S.lines.splice(i,1);renderLines();}

function renderResult(){
  const sb=document.getElementById('summaryBox');
  const mc=document.getElementById('modulesContainer');
  const stN=S.stages.map(s=>STAGES.find(st=>st.id===s)?.[lang]).filter(Boolean);
  const majorLevel=Object.entries(S.levels).sort((a,b)=>b[1]-a[1])[0]?.[0]||'zero';
  const lvName=LEVELS.find(l=>l.id===majorLevel)?.[lang]||'—';

  const r=(k,v)=>`<div class="summary-row"><span class="summary-label">${k}</span><span class="summary-value">${v}</span></div>`;
  sb.innerHTML=
    r(lang==='va'?'Centre:':'Centro:',`${S.name||'—'} (${S.type||'—'})`)+
    r(lang==='va'?'Etapes:':'Etapas:',stN.join(', ')||'—')+
    r(lang==='va'?'Docents:':'Docentes:',S.num||'—')+
    r(lang==='va'?'Nivell majoritari:':'Nivel mayoritario:',lvName)+
    r(lang==='va'?'Coordinador/a:':'Coordinador/a:',S.contact||'—')+
    r(lang==='va'?'Línies:':'Líneas:',S.lines.length);

  let ord=[...S.lines];
  if(!ord.includes(20))ord.unshift(20);
  if(!ord.includes(1)&&(majorLevel==='zero'||majorLevel==='basic'))ord.unshift(1);
  if(!ord.includes(2)&&S.copilot.no>S.copilot.yes)ord.splice(Math.min(1,ord.length),0,2);
  ord=[...new Set(ord)];

  mc.innerHTML=ord.map((n,i)=>{
    const line=LINES.find(l=>l.n===n);
    const ct=CONTENTS[n]||[];
    const hrs=ct.length<=2?4:ct.length<=4?8:12;
    return `<div class="mod-block"><div class="mod-head"><div class="mod-num">${String(i+1).padStart(2,'0')}</div><div class="mod-title">${line?line[lang]:'Línia '+n}</div></div>
    <div class="mod-body"><ul>${ct.map(c=>`<li>${c[lang]}</li>`).join('')}</ul>
    <div class="mod-tag">${hrs}h · ${CATS[line?.cat]?.[lang]||''}</div></div></div>`;
  }).join('');
}

const TOTAL=5;
function renderStep(){
  document.querySelectorAll('.step-card').forEach((c,i)=>c.classList.toggle('hidden',i!==step));
  document.getElementById('stepsBar').innerHTML=Array.from({length:TOTAL},(_,i)=>
    `<div class="step-dot${i<step?' done':''}${i===step?' active':''}"></div>`).join('');
  document.getElementById('prevBtn').classList.toggle('hidden',step===0);
  document.getElementById('nextBtn').classList.toggle('hidden',step===TOTAL-1);
  document.getElementById('nextBtn').textContent=lang==='va'?'Següent →':'Siguiente →';
  document.getElementById('pdfBtn').classList.toggle('hidden',step!==TOTAL-1);
  document.getElementById('pdfBtn').textContent=lang==='va'?'⬇ Descarregar PDF':'⬇ Descargar PDF';

  if(step===0) renderChips('stagesGrid',STAGES,'stages');
  if(step===1){
    S.num=parseInt(document.getElementById('fNum')?.value)||S.num;
    renderDist('levelDist',LEVELS,'levels','levelTotal','levelTarget','levelCheck');
    renderDist('priorDist',PRIOR,'prior','priorTotal','priorTarget','priorCheck');
    renderDist('copilotDist',COPILOT,'copilot','copilotTotal','copilotTarget','copilotCheck');
  }
  if(step===2) renderChips('usageGrid',USAGE,'usage');
  if(step===3) renderLines();
  if(step===4) renderResult();
  tAll();
  window.scrollTo({top:0,behavior:'smooth'});
}

function nextStep(){
  if(step===0){S.name=document.getElementById('fName').value;S.type=document.getElementById('fType').value;S.num=parseInt(document.getElementById('fNum').value)||0;S.contact=document.getElementById('fContact').value;}
  if(step<TOTAL-1){step++;renderStep();}
}
function prevStep(){if(step>0){step--;renderStep();}}

// PDF
document.getElementById('pdfBtn').addEventListener('click',()=>{
  const{jsPDF}=window.jspdf;const d=new jsPDF({unit:'mm',format:'a4'});
  const W=210,M=20,CW=W-2*M;let y=M;
  function chk(n){if(y+n>277){d.addPage();y=M;}}

  d.setFillColor(27,42,58);d.rect(0,0,W,52,'F');
  d.setTextColor(255);d.setFont('helvetica','bold');d.setFontSize(20);
  d.text('Proposta PAF · IA en educació',W/2,24,{align:'center'});
  d.setFontSize(10);d.setFont('helvetica','normal');
  d.text("CEFIRE d'Intel·ligència Artificial i Pensament Computacional",W/2,33,{align:'center'});
  d.text("Conselleria d'Educació · Generalitat Valenciana · Juliol 2026",W/2,40,{align:'center'});
  y=62;

  d.setTextColor(27,42,58);d.setFontSize(13);d.setFont('helvetica','bold');
  d.text(lang==='va'?'Resum del centre':'Resumen del centro',M,y);y+=7;
  d.setFontSize(9.5);
  const stN=S.stages.map(s=>STAGES.find(st=>st.id===s)?.[lang]).filter(Boolean);
  const majorLv=Object.entries(S.levels).sort((a,b)=>b[1]-a[1])[0]?.[0]||'zero';
  [[lang==='va'?'Centre':'Centro',`${S.name} (${S.type})`],[lang==='va'?'Etapes':'Etapas',stN.join(', ')],[lang==='va'?'Docents':'Docentes',String(S.num)],[lang==='va'?'Coordinador/a':'Coordinador/a',S.contact]].forEach(([k,v])=>{
    d.setFont('helvetica','bold');d.text(k+':',M,y);d.setFont('helvetica','normal');d.text(v||'—',M+35,y);y+=5.5;
  });

  y+=3;d.setFont('helvetica','bold');d.text(lang==='va'?'Distribució per nivell:':'Distribución por nivel:',M,y);y+=5;
  d.setFont('helvetica','normal');
  LEVELS.forEach(l=>{d.text(`${l[lang]}: ${S.levels[l.id]}`,M+4,y);y+=4.5;});
  y+=5;

  d.setFontSize(13);d.setFont('helvetica','bold');d.text(lang==='va'?'Mòduls formatius':'Módulos formativos',M,y);y+=7;

  let ord=[...S.lines];
  if(!ord.includes(20))ord.unshift(20);
  if(!ord.includes(1)&&(majorLv==='zero'||majorLv==='basic'))ord.unshift(1);
  if(!ord.includes(2)&&S.copilot.no>S.copilot.yes)ord.splice(Math.min(1,ord.length),0,2);
  ord=[...new Set(ord)];

  ord.forEach((n,i)=>{
    const line=LINES.find(l=>l.n===n);const ct=CONTENTS[n]||[];
    const bH=8+ct.length*4.5;chk(bH+4);
    d.setFillColor(238,243,249);d.roundedRect(M,y-1,CW,bH+2,2,2,'F');
    d.setFontSize(10);d.setFont('helvetica','bold');d.setTextColor(27,42,58);
    d.text(`${String(i+1).padStart(2,'0')}. ${line?line[lang]:''}`,M+3,y+5);y+=9;
    d.setFontSize(8.5);d.setFont('helvetica','normal');d.setTextColor(96,112,128);
    ct.forEach(c=>{d.text('• '+c[lang],M+5,y);y+=4.5;});y+=3;
  });

  chk(15);y+=4;d.setDrawColor(212,227,237);d.line(M,y,W-M,y);y+=5;
  d.setFontSize(7.5);d.setTextColor(100);
  d.text("CC BY-NC-SA 4.0 · CEFIRE IA i PC · Generalitat Valenciana",W/2,y,{align:'center'});
  d.save(`PAF_IA_${S.name.replace(/\s+/g,'_')||'centre'}.pdf`);
});

function setLang(l){lang=l;renderStep();}
renderStep();
</script>
